name: test-telegram

# Manual-only smoke test: sends a single Telegram message using the
# configured secrets. Use this to verify that TELEGRAM_BOT_TOKEN and
# TELEGRAM_CHAT_ID are wired up correctly without running the full
# stock checker.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install httpx
        run: pip install httpx==0.27.2

      - name: Send test message
        working-directory: src
        run: python notify.py
