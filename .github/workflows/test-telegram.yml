name: test-telegram

# Manual-only smoke test. Sends the production-format stock alert to
# Telegram so you can preview exactly what arrives when an actual
# restock is detected.

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Which restock scenario to preview"
        type: choice
        options:
          - silver
          - black
          - both
        default: silver

permissions:
  contents: read

jobs:
  send-sample:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SAMPLE_SCENARIO: ${{ inputs.scenario }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install httpx==0.27.2

      - name: Send sample alert
        working-directory: src
        run: python send_sample_alert.py
